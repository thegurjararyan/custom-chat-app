<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e;
    --border: #272727; --border2: #303030;
    --text: #e9e4dd; --dim: #888480; --dimmer: #444;
    --accent: #c97b56; --accent2: #d98f6a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; font-size:14px; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

  /* topbar */
  .top { display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:52px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .brand { display:flex; align-items:center; gap:10px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); }
  .brand span { font-size:13px; letter-spacing:.04em; }
  .cfg-btn { display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border2); border-radius:20px; padding:5px 14px; cursor:pointer; transition:border-color .15s; font-family:'DM Mono',monospace; font-size:11px; color:var(--dim); }
  .cfg-btn:hover { border-color:var(--accent); color:var(--text); }
  .cfg-dot { width:6px; height:6px; border-radius:50%; background:var(--dimmer); flex-shrink:0; transition:background .3s; }
  .cfg-dot.on { background:#6b9e78; box-shadow:0 0 5px #6b9e78; }
  .clr { background:none; border:1px solid var(--border2); border-radius:8px; padding:5px 12px; color:var(--dim); font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; }
  .clr:hover { color:var(--text); background:var(--surface2); }

  /* messages */
  .msgs { flex:1; overflow-y:auto; padding:28px 0 12px; }
  .msgs::-webkit-scrollbar { width:4px; }
  .msgs::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
  .inner { max-width:680px; margin:0 auto; padding:0 20px; }

  .welcome { text-align:center; padding:60px 20px; animation:up .4s ease both; }
  .welcome-g { font-family:'DM Serif Display',serif; font-size:52px; color:var(--accent); opacity:.8; margin-bottom:16px; }
  .welcome h2 { font-family:'DM Serif Display',serif; font-size:26px; font-weight:400; margin-bottom:10px; }
  .welcome p { color:var(--dim); font-size:13px; line-height:1.8; max-width:320px; margin:0 auto 24px; }
  .w-url { display:inline-block; background:var(--surface2); border:1px solid var(--border2); border-radius:8px; padding:8px 16px; font-size:11px; color:var(--dim); cursor:pointer; transition:all .15s; word-break:break-all; max-width:100%; }
  .w-url:hover { border-color:var(--accent); color:var(--accent); }

  .row { display:flex; gap:12px; margin-bottom:24px; animation:up .25s ease both; }
  .av { width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; margin-top:1px; }
  .av.user { background:var(--surface2); border:1px solid var(--border2); color:var(--dim); }
  .av.ai { background:var(--accent); color:#fff; font-family:'DM Serif Display',serif; font-size:13px; }
  .cnt { flex:1; min-width:0; }
  .lbl { font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--dimmer); margin-bottom:5px; }
  .bbl { font-size:14px; line-height:1.8; color:var(--text); }
  .bbl.user { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; display:inline-block; max-width:100%; white-space:pre-wrap; }
  .bbl pre { background:var(--surface2); border:1px solid var(--border2); border-radius:8px; padding:12px 14px; overflow-x:auto; margin:10px 0; font-size:12px; line-height:1.6; }
  .bbl code { background:var(--surface2); padding:1px 5px; border-radius:4px; font-size:12px; color:var(--accent2); }
  .bbl pre code { background:none; padding:0; color:var(--text); }

  .typing { display:flex; gap:5px; align-items:center; padding:3px 0; }
  .typing span { width:5px; height:5px; border-radius:50%; background:var(--dimmer); animation:bounce 1.1s infinite; }
  .typing span:nth-child(2) { animation-delay:.18s; }
  .typing span:nth-child(3) { animation-delay:.36s; }

  .err { background:rgba(180,60,60,.08); border:1px solid rgba(180,60,60,.25); border-radius:8px; padding:10px 14px; color:#c06060; font-size:13px; line-height:1.6; }

  /* input */
  .inp-wrap { padding:14px 20px 18px; background:var(--bg); border-top:1px solid var(--border); flex-shrink:0; }
  .inp-inner { max-width:680px; margin:0 auto; }
  .inp-box { display:flex; align-items:flex-end; gap:10px; background:var(--surface); border:1px solid var(--border2); border-radius:12px; padding:12px 14px; transition:border-color .2s; }
  .inp-box:focus-within { border-color:#3a3a3a; }
  textarea { flex:1; background:none; border:none; outline:none; color:var(--text); font-family:'DM Mono',monospace; font-size:14px; line-height:1.6; resize:none; max-height:180px; overflow-y:auto; scrollbar-width:none; }
  textarea::placeholder { color:var(--dimmer); }
  .send { width:32px; height:32px; background:var(--accent); border:none; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; opacity:.35; }
  .send:not(:disabled):hover { background:var(--accent2); transform:translateY(-1px); }
  .send.on { opacity:1; }
  .send:disabled { cursor:default; }
  .send svg { width:14px; height:14px; fill:#fff; }
  .hint { text-align:center; font-size:10px; color:var(--dimmer); margin-top:9px; letter-spacing:.04em; }
  .hint kbd { border:1px solid var(--border2); border-radius:3px; padding:1px 4px; font-family:'DM Mono',monospace; font-size:10px; }

  /* modal */
  .ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(6px); z-index:50; align-items:center; justify-content:center; }
  .ov.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border2); border-radius:14px; padding:26px; width:460px; max-width:calc(100vw - 32px); animation:up .2s ease both; }
  .modal h3 { font-family:'DM Serif Display',serif; font-size:20px; margin-bottom:6px; }
  .modal p { font-size:12px; color:var(--dim); line-height:1.7; margin-bottom:20px; }
  .modal p code { background:var(--surface2); padding:1px 5px; border-radius:4px; color:var(--accent2); font-size:11px; }
  .fl { font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); margin-bottom:6px; display:block; }
  .fi { width:100%; background:var(--surface2); border:1px solid var(--border2); border-radius:8px; padding:9px 12px; color:var(--text); font-family:'DM Mono',monospace; font-size:12px; outline:none; transition:border-color .15s; margin-bottom:14px; }
  .fi:focus { border-color:var(--accent); }
  .fi::placeholder { color:var(--dimmer); }
  .prev { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:9px 12px; font-size:11px; color:var(--dim); word-break:break-all; line-height:1.6; margin-bottom:20px; min-height:38px; }
  .prev span { color:var(--accent2); }
  .mbtns { display:flex; gap:10px; justify-content:flex-end; }
  .bp { background:var(--accent); border:none; border-radius:8px; padding:8px 18px; color:#fff; font-family:'DM Mono',monospace; font-size:12px; cursor:pointer; }
  .bp:hover { background:var(--accent2); }
  .bs { background:var(--surface2); border:1px solid var(--border2); border-radius:8px; padding:8px 18px; color:var(--dim); font-family:'DM Mono',monospace; font-size:12px; cursor:pointer; }
  .bs:hover { color:var(--text); }

  @keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-4px);opacity:1} }
</style>
</head>
<body>

<div class="top">
  <div class="brand"><div class="dot"></div><span>chat</span></div>
  <div class="cfg-btn" onclick="openModal()">
    <div class="cfg-dot" id="cdot"></div>
    <span id="clabel">Set Worker URL</span>
  </div>
  <button class="clr" onclick="clearChat()">clear</button>
</div>

<div class="msgs" id="msgs">
  <div class="inner" id="inner">
    <div class="welcome" id="welcome">
      <div class="welcome-g">◈</div>
      <h2>Chat with your API</h2>
      <p>Paste your Cloudflare Worker URL below to get started.</p>
      <div class="w-url" onclick="openModal()" id="wurl">Click to set Worker URL →</div>
    </div>
  </div>
</div>

<div class="inp-wrap">
  <div class="inp-inner">
    <div class="inp-box">
      <textarea id="ta" placeholder="Type a message…" rows="1"
        oninput="onInp(this)" onkeydown="onKey(event)"></textarea>
      <button class="send" id="sb" onclick="send()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="hint"><kbd>Enter</kbd> send · <kbd>Shift+Enter</kbd> newline</div>
  </div>
</div>

<div class="ov" id="ov" onclick="bgC(event)">
  <div class="modal">
    <h3>Worker URL</h3>
    <p>Apna Cloudflare Worker URL daal. Message automatically <code>?message=...</code> ke saath jayega.</p>
    <label class="fl">Cloudflare Worker URL</label>
    <input class="fi" id="ui" type="text" placeholder="https://myproxy.aryan.workers.dev" oninput="updPrev()"/>
    <label class="fl">Preview</label>
    <div class="prev" id="prev"><span>https://...</span>?message=<span>Hello!</span></div>
    <div class="mbtns">
      <button class="bs" onclick="closeModal()">Cancel</button>
      <button class="bp" onclick="saveUrl()">Save</button>
    </div>
  </div>
</div>

<script>
  let base = localStorage.getItem('workerBase') || '';
  let busy = false;

  if (base) setBadge(base);

  function setBadge(url) {
    document.getElementById('cdot').className = 'cfg-dot on';
    document.getElementById('clabel').textContent = url.replace(/https?:\/\//,'').slice(0,36);
    const w = document.getElementById('wurl');
    if (w) w.textContent = url + '?message=Hello!';
  }

  function openModal() {
    document.getElementById('ui').value = base;
    updPrev();
    document.getElementById('ov').classList.add('open');
    setTimeout(() => document.getElementById('ui').focus(), 80);
  }
  function closeModal() { document.getElementById('ov').classList.remove('open'); }
  function bgC(e) { if (e.target===document.getElementById('ov')) closeModal(); }

  function updPrev() {
    const url = document.getElementById('ui').value.trim();
    document.getElementById('prev').innerHTML = `<span>${url||'https://...'}</span>?message=<span>Hello!</span>`;
  }

  function saveUrl() {
    const url = document.getElementById('ui').value.trim().replace(/\?.*$/,'').replace(/\/$/,'');
    if (!url) return;
    base = url;
    localStorage.setItem('workerBase', base);
    setBadge(base);
    closeModal();
  }

  function onInp(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight,180)+'px';
    const has = el.value.trim().length > 0;
    document.getElementById('sb').disabled = !has;
    document.getElementById('sb').classList.toggle('on', has);
  }

  function onKey(e) { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }

  async function send() {
    const ta = document.getElementById('ta');
    const text = ta.value.trim();
    if (!text || busy) return;
    if (!base) { openModal(); return; }

    document.getElementById('welcome')?.remove();
    appendMsg('user', text);
    ta.value=''; ta.style.height='auto';
    document.getElementById('sb').disabled=true;
    document.getElementById('sb').classList.remove('on');
    busy = true;

    const tid = showTyping();
    try {
      const res = await fetch(base + '?message=' + encodeURIComponent(text));
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const ct = (res.headers.get('content-type')||'').toLowerCase();
      let reply;
      if (ct.includes('json')) {
        const d = await res.json();
        // bhaye ka key is "reply"
        reply = d.reply ?? d.response ?? d.content ?? d.message ?? d.text ?? d.answer ?? JSON.stringify(d,null,2);
        reply = String(reply);
      } else {
        reply = (await res.text()).trim();
      }
      removeEl(tid);
      appendMsg('ai', reply);
    } catch(e) {
      removeEl(tid);
      appendErr(e.message);
    }
    busy = false;
    scrollBot();
  }

  function appendMsg(role, text) {
    const inner = document.getElementById('inner');
    const row = document.createElement('div');
    row.className = 'row';
    const bbl = document.createElement('div');
    bbl.className = `bbl ${role}`;
    if (role==='ai') bbl.innerHTML = md(text); else bbl.textContent = text;
    row.innerHTML = `<div class="av ${role}">${role==='user'?'U':'◈'}</div><div class="cnt"><div class="lbl">${role==='user'?'you':'assistant'}</div></div>`;
    row.querySelector('.cnt').appendChild(bbl);
    inner.appendChild(row);
    scrollBot();
  }

  function showTyping() {
    const id = 't'+Date.now();
    const inner = document.getElementById('inner');
    const row = document.createElement('div');
    row.className='row'; row.id=id;
    row.innerHTML=`<div class="av ai">◈</div><div class="cnt"><div class="lbl">assistant</div><div class="typing"><span></span><span></span><span></span></div></div>`;
    inner.appendChild(row); scrollBot(); return id;
  }

  function appendErr(msg) {
    const inner = document.getElementById('inner');
    const row = document.createElement('div');
    row.className='row';
    row.innerHTML=`<div class="av ai">◈</div><div class="cnt"><div class="lbl">error</div><div class="err">⚠ ${esc(msg)}</div></div>`;
    inner.appendChild(row);
  }

  function removeEl(id){document.getElementById(id)?.remove();}
  function scrollBot(){const m=document.getElementById('msgs');m.scrollTop=m.scrollHeight;}
  function clearChat(){document.getElementById('inner').innerHTML='';}
  function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function md(t) {
    return t
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n?([\s\S]*?)```/g,(_,c)=>`<pre><code>${c.trim()}</code></pre>`)
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
  }
</script>
</body>
</html>
